<!DOCTYPE html>
<html>
<head>
    <title>Lead Machine</title>
</head>
<body>

<h1>🔥 Leads Dashboard</h1>

<a href="/run">▶️ Lancer scraping</a> |
<a href="/download">⬇️ Télécharger CSV</a>

<table border="1" cellpadding="5">
<tr>
    <th>Profil</th>
    <th>Post</th>
    <th>Score</th>
    <th>Date</th>
</tr>

{% for l in leads %}
<tr>
    <td><a href="{{ l.profile }}" target="_blank">Profil</a></td>
    <td><a href="{{ l.post }}" target="_blank">Post</a></td>
    <td>{{ l.score }}</td>
    <td>{{ l.date }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
